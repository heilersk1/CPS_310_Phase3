<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
</head>
<body>
    <h1>Feedback Page</h1>

    <h2>All Feedback</h2>
    <ul>
        {% for item in feedback %}
            <li>
                {{ item.name }}: {{ item.comments }}
            </li>
        {% empty %}
            <li>No feedback yet.</li>
        {% endfor %}
    </ul>
</body>
</html>
