<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toy Store</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <style>
        /* Hero section styling */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #FFF6EA;
            color: #000000;
        }

        header {
            background: linear-gradient(to right, #728063, #9CAF88);
            color: FFF6EA;
            text-align: center;
            padding: 80px 20px;
        }

        header h1 {
            font-size: 48px;
            margin: 0;
        }

        header p {
            font-size: 20px;
            margin-top: 10px;
        }

        /* Buttons container */
        .buttons {
            display: flex;
            justify-content: center;
            margin: 40px 0;
            gap: 20px;
        }

        .buttons a button {
            background-color: #9CAF88;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .buttons a button:hover {
            background-color: #728063;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to Our Toy Store!</h1>
    <p>We have fun toys for kids of all ages</p>
</header>

<div class="buttons">
    <a href="{% url 'store' %}"><button>Visit Store</button></a>
    <a href="{% url 'events' %}"><button>Events</button></a>
</div>
<div style="text-align:center; margin-top:20px;">
    <a href="{% url 'login' %}">
        <button style="padding:10px 20px;">Login</button>
    </a>
</div>

</body>
</html>
